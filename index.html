                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Ninja: Falling Edition - Isaac Pro</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; cursor: crosshair; }
        canvas { display: block; background: radial-gradient(circle, #222 0%, #000 100%); }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; color: gold; font-size: 24px; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); z-index: 5; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        .award-title { color: gold; font-size: 35px; margin-bottom: 10px; text-shadow: 0 0 20px gold; }
        .trophy { font-size: 80px; margin: 20px 0; display: none; filter: drop-shadow(0 0 15px gold); }
        button { background: gold; color: #000; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px gold; }
    </style>
</head>
<body>

    <div id="ui">
        <div>Time: <span id="timer">15</span>s</div>
        <div>Score: <span id="score">0</span></div>
        <div>Round: <span id="round">1</span></div>
    </div>

    <div id="overlay">
        <h1 id="status-text" class="award-title">READY TO SLICE?</h1>
        <div id="trophy" class="trophy">🏆</div>
        <button id="action-btn" onclick="startCurrentRound()">START ROUND 1</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        const roundEl = document.getElementById('round');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const trophy = document.getElementById('trophy');
        const actionBtn = document.getElementById('action-btn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let timeLeft = 15;
        let round = 1;
        let active = false;
        let fruits = [];
        let particles = [];
        let swordPath = [];
        
        // Realistic Sword Sound
        const sliceSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        class Fruit {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -50;
                this.r = 30 + Math.random() * 15;
                this.color = ['#FF3B30', '#FFCC00', '#4CD964', '#FF9500', '#AF52DE'][Math.floor(Math.random()*5)];
                this.speedY = 3 + Math.random() * (2 + round); // Speed increases with round
                this.sliced = false;
            }
            draw() {
                if(this.sliced) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // Shine effect
                ctx.beginPath();
                ctx.arc(this.x - this.r/3, this.y - this.r/3, this.r/4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();
            }
        }

        function startCurrentRound() {
            overlay.style.display = 'none';
            score = 0;
            scoreEl.innerText = score;
            timeLeft = round === 1 ? 15 : (round === 2 ? 20 : 30);
            timerEl.innerText = timeLeft;
            active = true;
            
            const timerInterval = setInterval(() => {
                if(!active) { clearInterval(timerInterval); return; }
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) endRound();
            }, 1000);
            
            animate();
        }

        function endRound() {
            active = false;
            overlay.style.display = 'flex';
            const targetScore = round * 12;
            
            if(score >= targetScore) {
                statusText.innerText = "ROUND " + round + " PASSED!";
                trophy.style.display = 'block';
                round++;
                if(round > 3) {
                    statusText.innerText = "ULTIMATE CHAMPION! 🏆";
                    actionBtn.innerText = "RESTART GAME";
                    round = 1;
                } else {
                    actionBtn.innerText = "START ROUND " + round;
                }
            } else {
                statusText.innerText = "FAILED! NEED " + targetScore + " POINTS";
                trophy.style.display = 'none';
                actionBtn.innerText = "TRY AGAIN";
            }
        }

        function handleInteraction(x, y) {
            if(!active) return;
            
            // Draw Sword Trail
            swordPath.push({x, y, age: 0});
            if(swordPath.length > 10) swordPath.shift();

            fruits.forEach(f => {
                let d = Math.hypot(x - f.x, y - f.y);
                if(d < f.r && !f.sliced) {
                    f.sliced = true;
                    score++;
                    scoreEl.innerText = score;
                    sliceSound.currentTime = 0;
                    sliceSound.play();
                    // Splatter particles
                    for(let i=0; i<12; i++) {
                        particles.push({
                            x: f.x, y: f.y,
                            vx: (Math.random()-0.5)*10,
                            vy: (Math.random()-0.5)*10,
                            alpha: 1, color: f.color
                        });
                    }
                }
            });
        }

        window.addEventListener('mousemove', (e) => handleInteraction(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        function animate() {
            if(!active && particles.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spawn Fruits from Top
            if(Math.random() < 0.04 + (round * 0.01)) fruits.push(new Fruit());

            fruits.forEach((f, i) => {
                f.y += f.speedY;
                f.draw();
                if(f.y > canvas.height + 50) fruits.splice(i, 1);
            });

            // Particles update
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 6, 6);
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            // Draw Sword Trail
            if(swordPath.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 3;
                ctx.moveTo(swordPath[0].x, swordPath[0].y);
                for(let i=1; i<swordPath.length; i++) ctx.lineTo(swordPath[i].x, swordPath[i].y);
                ctx.stroke();
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
