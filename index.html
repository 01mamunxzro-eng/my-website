<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isaac Pro Racer - High Speed</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; background: #111; margin: 0 auto; box-shadow: 0 0 50px gold; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: gold; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 5; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        h1 { color: gold; font-size: 40px; margin: 0; letter-spacing: 5px; }
        p { color: white; margin-top: 10px; font-size: 14px; }
        button { background: gold; color: black; border: none; padding: 15px 50px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 0 20px gold; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .btn { width: 100px; height: 100px; background: rgba(255, 215, 0, 0.2); border: 3px solid gold; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: gold; -webkit-user-select: none; }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>

    <div id="start-screen">
        <h1>ISAAC RACER</h1>
        <p>অন্য গাড়িগুলো এড়িয়ে সর্বোচ্চ স্কোর করুন!</p>
        <button onclick="startGame()">START ENGINE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls" id="controls" style="display: none;">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const controls = document.getElementById('controls');

        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let gameSpeed = 5;
        let player = { x: canvas.width / 2 - 25, y: canvas.height - 150, w: 50, h: 90 };
        let enemies = [];
        let moveDir = 0;

        function startGame() {
            gameActive = true;
            score = 0;
            gameSpeed = 5;
            enemies = [];
            startScreen.style.display = 'none';
            controls.style.display = 'flex';
            requestAnimationFrame(update);
        }

        // Controls Logic
        document.getElementById('leftBtn').addEventListener('touchstart', () => moveDir = -8);
        document.getElementById('rightBtn').addEventListener('touchstart', () => moveDir = 8);
        document.getElementById('leftBtn').addEventListener('touchend', () => moveDir = 0);
        document.getElementById('rightBtn').addEventListener('touchend', () => moveDir = 0);

        // PC Controls
        window.onkeydown = (e) => {
            if(e.key === "ArrowLeft") moveDir = -8;
            if(e.key === "ArrowRight") moveDir = 8;
        };
        window.onkeyup = () => moveDir = 0;

        function spawnEnemy() {
            if (Math.random() < 0.02) {
                let laneWidth = canvas.width / 3;
                let lane = Math.floor(Math.random() * 3);
                enemies.push({ x: lane * laneWidth + (laneWidth/2 - 25), y: -100, w: 50, h: 90 });
            }
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Road
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "gold";
            ctx.setLineDash([40, 20]);
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 3, 0); ctx.lineTo(canvas.width / 3, canvas.height);
            ctx.moveTo(2 * canvas.width / 3, 0); ctx.lineTo(2 * canvas.width / 3, canvas.height);
            ctx.stroke();

            // Player Car (Isaac Special)
            ctx.fillStyle = "gold";
            ctx.shadowBlur = 20; ctx.shadowColor = "gold";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "black"; // Windshield
            ctx.fillRect(player.x + 10, player.y + 15, 30, 20);
            ctx.shadowBlur = 0;

            player.x += moveDir;
            if(player.x < 0) player.x = 0;
            if(player.x > canvas.width - player.w) player.x = canvas.width - player.w;

            // Enemies
            spawnEnemy();
            enemies.forEach((en, index) => {
                en.y += gameSpeed;
                ctx.fillStyle = "#ff4d4d"; // Red enemy cars
                ctx.fillRect(en.x, en.y, en.w, en.h);

                // Collision Check
                if (player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
                    gameOver();
                }

                if(en.y > canvas.height) {
                    enemies.splice(index, 1);
                    score++;
                    scoreVal.innerText = score;
                    if(score % 10 === 0) gameSpeed += 0.5; // গতি বাড়ানো
                }
            });

            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            alert("💥 CRASHED! 💥\nYour Final Score: " + score);
            location.reload();
        }
    </script>
</body>
</html>
