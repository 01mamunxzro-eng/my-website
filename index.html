<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Stack - Premium Game</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; text-align: center; }
        canvas { display: block; background: #1a1a1a; margin: 0 auto; box-shadow: 0 0 20px #d4af37; border-bottom: 5px solid #d4af37; }
        #ui { position: absolute; top: 20px; width: 100%; pointer-events: none; }
        .score-box { font-size: 30px; font-weight: bold; color: #d4af37; }
        #start-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 30px; border: 2px solid #d4af37; border-radius: 15px; width: 80%; max-width: 300px; }
        button { background: #d4af37; color: black; border: none; padding: 10px 25px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-box">Score: <span id="score">0</span></div>
    </div>

    <div id="start-screen">
        <h1 style="color:#d4af37">BURGER STACK</h1>
        <p>একটির ওপর আরেকটি বার্গার স্লাইস সাজান! ব্যালেন্স হারালেই গেম শেষ।</p>
        <button onclick="startGame()">PLAY NOW</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');

        canvas.width = window.innerWidth > 400 ? 400 : window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = false;
        let boxes = [];
        let speed = 2;
        let currentBox = { x: 0, y: 0, w: 150, h: 30, color: '#d4af37', dir: 1 };

        function startGame() {
            score = 0;
            speed = 3;
            gameActive = true;
            startScreen.style.display = 'none';
            boxes = [{ x: (canvas.width - 150) / 2, y: canvas.height - 50, w: 150, h: 30, color: '#8b4513' }]; // Base
            newBox();
            animate();
        }

        function newBox() {
            const lastBox = boxes[boxes.length - 1];
            currentBox = {
                x: 0,
                y: lastBox.y - 30,
                w: lastBox.w,
                h: 30,
                color: score % 2 === 0 ? '#d4af37' : '#ffa500',
                dir: 1
            };
        }

        window.onclick = () => {
            if (!gameActive) return;

            const lastBox = boxes[boxes.length - 1];
            
            // Checking if stack is aligned
            if (currentBox.x + currentBox.w < lastBox.x || currentBox.x > lastBox.x + lastBox.w) {
                gameOver();
                return;
            }

            // Slice the box (Simple version: just snap to stack)
            currentBox.x = Math.max(lastBox.x, Math.min(currentBox.x, lastBox.x)); 
            
            boxes.push({ ...currentBox });
            score++;
            scoreEl.innerText = score;
            speed += 0.1;

            if (boxes.length > 5) {
                boxes.forEach(b => b.y += 30);
            }
            newBox();
        };

        function gameOver() {
            gameActive = false;
            alert("Game Over! Your Score: " + score);
            location.reload();
        }

        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw stack
            boxes.forEach(box => {
                ctx.fillStyle = box.color;
                ctx.fillRect(box.x, box.y, box.w, box.h);
                ctx.strokeStyle = '#111';
                ctx.strokeRect(box.x, box.y, box.w, box.h);
            });

            // Move current box
            currentBox.x += speed * currentBox.dir;
            if (currentBox.x + currentBox.w > canvas.width || currentBox.x < 0) {
                currentBox.dir *= -1;
            }

            ctx.fillStyle = currentBox.color;
            ctx.fillRect(currentBox.x, currentBox.y, currentBox.w, currentBox.h);

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
